<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Playlist Date Sorter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1 data-popup-title></h1>
      <label class="field">
        <span data-popup-language-label></span>
        <select data-popup-language>
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </label>
      <p class="status" data-popup-status></p>
    </main>
    <script src="../shared/i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
